[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
build_flags =
    -DCORE_DEBUG_LEVEL=2
lib_deps =
    mathieucarbou/ESP Async WebServer @ ^3.3.12
    mathieucarbou/AsyncTCP @ ^3.2.7
    bblanchon/ArduinoJson @ ^7.3.1
